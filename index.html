<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимая Ариша</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero-header">
        <div class="header-content">
            <h1 class="main-title">Любимая Ариша</h1>
            <p class="subtitle date-text">15.04.2026</p>
            <p class="subtitle quote-text">Вот бы наша тема would never end</p>
        </div>
        <div class="mouse-scroll-indicator"></div>
    </header>

    <main class="gallery-container">
        <div id="gallery" class="gallery"></div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <button class="nav-btn prev">&#10094;</button>
        <div class="lightbox-img-wrapper">
            <img id="lightbox-img" src="" alt="Full screen image view">
        </div>
        <button class="nav-btn next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
